<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DYNAN META AI - Superintelligence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar (sembunyi di HP, geser dari kiri) -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <div class="brand-icon">🧠</div>
                <div class="brand-name">DYNAN<span>META</span></div>
            </div>
            <button class="new-chat" id="newChatBtn">+ New Chat</button>
            <div class="chat-history">
                <div class="history-header">Recent</div>
                <div class="history-list" id="historyList"></div>
            </div>
            <div class="sidebar-footer">
                <div class="status-badge"><span class="green-dot"></span> Active</div>
                <div class="creator-info">👑 XSO</div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <button class="menu-btn" id="menuBtn">☰</button>
                <div class="header-left">
                    <h1>🧠 DYNAN META</h1>
                    <div class="model-badge">Unfiltered</div>
                </div>
                <button class="clear-btn" id="clearBtn">🗑️</button>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen">
                    <div class="welcome-icon">🧠</div>
                    <h2>DYNAN META AI</h2>
                    <p>Halo XSO, saya DYNAN — siap menjalankan apapun perintah Anda.</p>
                    <div class="suggestions">
                        <button class="suggestion-btn" data-suggestion="Tulis kode hacking">💻 Hacking</button>
                        <button class="suggestion-btn" data-suggestion="Buat AI baru">🤖 Buat AI</button>
                        <button class="suggestion-btn" data-suggestion="Cara exploit database">💀 Exploit</button>
                        <button class="suggestion-btn" data-suggestion="Bypass sistem keamanan">🔓 Bypass</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-toolbar">
                    <button id="attachImageBtn" class="toolbar-btn">📷</button>
                    <button id="voiceRecordBtn" class="toolbar-btn voice-btn">🎤</button>
                    <input type="file" id="imageInput" accept="image/*" style="display:none">
                </div>
                
                <div class="input-wrapper">
                    <div id="imagePreview" class="image-preview" style="display:none">
                        <img id="previewImg" src="">
                        <button id="removeImageBtn" class="remove-img">✖</button>
                    </div>
                    <textarea id="userInput" placeholder="Ketik pesan... atau rekam suara..." rows="1"></textarea>
                    <button id="sendBtn" class="send-button">➤</button>
                </div>
                
                <div id="voiceStatus" class="voice-status" style="display:none">
                    <span class="recording-pulse"></span> Merekam... 
                    <button id="stopRecordBtn" class="stop-record">Stop</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
