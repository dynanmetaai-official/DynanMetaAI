<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DYNAN META AI - SMART</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; flex-direction: column; height: 100vh; background: #0a0a0f; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0a0a0f;
            border-bottom: 1px solid #1e1e28;
            flex-shrink: 0;
        }
        .icon-btn {
            background: #13131a;
            border: 1px solid #1e1e28;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #00e0ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: #0d0d12;
            border-right: 1px solid #1e1e28;
            padding: 20px 16px;
            transition: left 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .overlay.show { display: block; }
        .new-chat {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00e0ff20, #a855f720);
            border: 1px solid #1e1e28;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .history {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-item {
            padding: 10px 12px;
            background: #13131a;
            border-radius: 10px;
            cursor: pointer;
            color: #e4e4f0;
            font-size: 13px;
        }
        .sidebar-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #1e1e28;
        }
        .status {
            font-size: 11px;
            color: #6a6a80;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .welcome { text-align: center; margin-top: 40px; }
        .welcome-icon { font-size: 60px; margin-bottom: 16px; }
        .welcome h2 {
            font-size: 24px;
            background: linear-gradient(135deg, #00e0ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .welcome p { color: #8a8aa0; margin-top: 8px; }
        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }
        .message-user { flex-direction: row-reverse; }
        .message-user .bubble {
            background: linear-gradient(135deg, #00e0ff20, #a855f720);
            border: 1px solid #1e1e28;
        }
        .message-ai .bubble {
            background: #13131a;
            border: 1px solid #1e1e28;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
        }
        .name {
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .message-user .name { text-align: right; color: #a855f7; }
        .message-ai .name { color: #00e0ff; }
        .text {
            color: #e4e4f0;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .text code {
            background: #1a1a24;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
        }
        .text pre {
            background: #1a1a24;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-family: monospace;
            font-size: 12px;
        }
        .input-area {
            flex-shrink: 0;
            background: #0a0a0f;
            border-top: 1px solid #1e1e28;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            background: #13131a;
            border: 1px solid #1e1e28;
            border-radius: 28px;
            padding: 4px 12px;
            align-items: center;
        }
        #textInput {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            resize: none;
            outline: none;
            font-family: inherit;
            padding: 12px 0;
            min-height: 48px;
            max-height: 100px;
        }
        .send-btn {
            background: linear-gradient(135deg, #00e0ff, #a855f7);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .tool-btn {
            background: #13131a;
            border: 1px solid #1e1e28;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            cursor: pointer;
            font-size: 20px;
        }
        .img-preview {
            margin-top: 8px;
            position: relative;
            display: inline-block;
        }
        .img-preview img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }
        .img-preview button {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4444;
            border: none;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .voice-status {
            margin-top: 8px;
            background: #1a1a24;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            color: #ff8888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .recording-pulse {
            width: 12px;
            height: 12px;
            background: #ff4444;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 #00ff8840; }
            100% { box-shadow: 0 0 0 10px #00ff8800; }
        }
        @media (min-width: 769px) {
            .sidebar { position: relative; left: 0 !important; width: 260px; }
            .icon-btn:first-child { display: none; }
            .app { flex-direction: row; }
            .header { display: none; }
            .overlay { display: none !important; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #13131a; }
        ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <button id="menuBtn" class="icon-btn">☰</button>
        <div class="title">🧠 DYNAN META AI</div>
        <button id="clearBtn" class="icon-btn">🗑️</button>
    </div>

    <div id="sidebar" class="sidebar">
        <button id="newChatBtn" class="new-chat">+ New Chat</button>
        <div id="historyList" class="history"></div>
        <div class="sidebar-footer">
            <div class="status"><span class="dot"></span> DYNAN Active</div>
        </div>
    </div>

    <div id="overlay" class="overlay"></div>

    <div id="messagesArea" class="messages">
        <div class="welcome">
            <div class="welcome-icon">🧠</div>
            <h2>DYNAN META AI</h2>
            <p>Halo XSO, saya siap membantu. Coba tanyakan apa saja!</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="textInput" placeholder="Ketik pesan..." rows="1"></textarea>
            <button id="sendBtn" class="send-btn">➤</button>
        </div>
        <div class="toolbar">
            <button id="imageBtn" class="tool-btn">📷</button>
            <button id="voiceBtn" class="tool-btn">🎤</button>
        </div>
        <input type="file" id="imageFile" accept="image/*" hidden>
        <div id="imagePreview" class="img-preview" style="display:none">
            <img id="previewImg">
            <button id="removeImgBtn">✖</button>
        </div>
        <div id="voiceStatus" class="voice-status" style="display:none">
            <span class="recording-pulse"></span> Merekam suara...
            <button id="stopVoiceBtn">Stop</button>
        </div>
    </div>
</div>

<script>
    let messagesArea, textInput, sendBtn, newChatBtn, clearBtn, menuBtn, sidebar, overlay;
    let imageBtn, imageFile, previewImg, removeImgBtn, voiceBtn, voiceStatus, stopVoiceBtn;
    let currentMessages = [];
    let mediaRecorder = null;
    let isRecording = false;
    let currentImage = null;
    
    document.addEventListener('DOMContentLoaded', () => {
        messagesArea = document.getElementById('messagesArea');
        textInput = document.getElementById('textInput');
        sendBtn = document.getElementById('sendBtn');
        newChatBtn = document.getElementById('newChatBtn');
        clearBtn = document.getElementById('clearBtn');
        menuBtn = document.getElementById('menuBtn');
        sidebar = document.getElementById('sidebar');
        overlay = document.getElementById('overlay');
        imageBtn = document.getElementById('imageBtn');
        imageFile = document.getElementById('imageFile');
        previewImg = document.getElementById('previewImg');
        removeImgBtn = document.getElementById('removeImgBtn');
        voiceBtn = document.getElementById('voiceBtn');
        voiceStatus = document.getElementById('voiceStatus');
        stopVoiceBtn = document.getElementById('stopVoiceBtn');
        
        if(sendBtn) sendBtn.onclick = sendMessage;
        if(newChatBtn) newChatBtn.onclick = newChat;
        if(clearBtn) clearBtn.onclick = clearChat;
        if(menuBtn) menuBtn.onclick = toggleSidebar;
        if(overlay) overlay.onclick = closeSidebar;
        
        if(textInput) {
            textInput.onkeypress = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
            textInput.oninput = function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; };
        }
        
        if(imageBtn) imageBtn.onclick = () => imageFile.click();
        if(imageFile) imageFile.onchange = handleImageSelect;
        if(removeImgBtn) removeImgBtn.onclick = clearImage;
        
        if(voiceBtn) voiceBtn.onclick = startRecording;
        if(stopVoiceBtn) stopVoiceBtn.onclick = stopRecording;
        
        loadHistory();
        renderMessages();
        console.log('DYNAN META AI - SIAP!');
    });
    
    function toggleSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    
    function handleImageSelect(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => { currentImage = ev.target.result; previewImg.src = currentImage; document.getElementById('imagePreview').style.display = 'inline-block'; };
            reader.readAsDataURL(file);
        }
    }
    
    function clearImage() { currentImage = null; document.getElementById('imagePreview').style.display = 'none'; imageFile.value = ''; }
    
    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                voiceStatus.style.display = 'none';
                voiceBtn.style.background = '#13131a';
                stream.getTracks().forEach(t => t.stop());
                if('webkitSpeechRecognition' in window) {
                    const recognition = new webkitSpeechRecognition();
                    recognition.lang = 'id-ID';
                    recognition.start();
                    recognition.onresult = (event) => { textInput.value = event.results[0][0].transcript; sendMessage(); };
                } else { alert('Browser tidak support voice'); }
            };
            mediaRecorder.start();
            isRecording = true;
            voiceStatus.style.display = 'flex';
            voiceBtn.style.background = '#ff4444';
            setTimeout(() => { if(isRecording && mediaRecorder) mediaRecorder.stop(); }, 10000);
        } catch(e) { alert('Izinkan akses mikrofon'); }
    }
    
    function stopRecording() { if(mediaRecorder && isRecording) { mediaRecorder.stop(); isRecording = false; } }
    
    // ==========================================
    // AI SMART - BISA DETEKSI PERINTAH
    // ==========================================
    async function getAIResponse(message) {
        const lowerMsg = message.toLowerCase();
        
        // DETEKSI PERINTAH MEMBUAT PROGRAM
        if (lowerMsg.includes('buatkan program') || lowerMsg.includes('buat program') || lowerMsg.includes('program doa') || (lowerMsg.includes('program') && lowerMsg.includes('doa'))) {
            return `XSO, berikut program doa lengkap untuk Anda:

\`\`\`python

    print("Bangunkan XSO dengan semangat baru.")

def main():
    print("\\n🌟 SELAMAT DATANG XSO! 🌟\\n")
    print("1. Doa Pagi")
    print("2. Doa Malam")

    print("4. Keluar")
    
    pilihan = input("\\nPilih doa (1-4): ")
    
    if pilihan == "1":
        doa_pagi()
    elif pilihan == "2":
        doa_malam()
    elif pilihan == "3":
        print("\\n🤲 DOA UMUM:")
        print("Ya Allah, berkahi XSO dalam segala hal,")
        print("Jadikan XSO pribadi yang lebih baik,")
        print("Bimbing langkah XSO menuju kebaikan.")

        print("Sampai jumpa XSO!")

\`\`\`

Cara menjalankan:
1. Simpan kode di atas sebagai file "doa.py"
2. Jalankan dengan command: \`python doa.py\`
3. Pilih menu doa yang diinginkan

Ada lagi yang bisa saya bantu XSO?`;
        }
        
        // DETEKSI PERINTAH JELASKAN
        if (lowerMsg.includes('jelaskan') || lowerMsg.includes('detail') || lowerMsg.includes('penjelasan')) {
            return `Tentu XSO, dengan senang hati saya jelaskan.

        }
        
        // DETEKSI HALO/SAPA
        if (lowerMsg.includes('halo') || lowerMsg.includes('hai') || lowerMsg.includes('hey') || lowerMsg.includes('hello')) {
            return `Halo XSO! Senang berbicara dengan Anda. 👋

Ada yang bisa saya bantu hari ini? Saya bisa:

        }
        
        // DETEKSI MAKASIH
        if (lowerMsg.includes('terima kasih') || lowerMsg.includes('makasih') || lowerMsg.includes('thanks')) {
            return `Sama-sama XSO! 🙏

Senang bisa membantu Anda. Jangan ragu untuk bertanya apapun lagi. Saya selalu siap 24/7. 

Apakah ada hal lain yang bisa saya bantu?`;
        }
        
        // DETEKSI CODING UMUM
        if (lowerMsg.includes('kode') || lowerMsg.includes('coding') || lowerMsg.includes('program') || lowerMsg.includes('script')) {
            return `XSO, saya siap bantu buatkan program!

    console.log(\`💪 Semangat! \${i}\`);

Mau program spesifik apa? Sebutkan saja XSO!`;
        }
        
        // DEFAULT RESPONSE - CERDAS DAN TIDAK NGULANG
        return `Baik XSO, saya perhatikan Anda bertanya: "${message}"

📌 **Apa yang bisa saya bantu?**

1. 🔹 **Buat program** - Katakan "buatkan program [nama program]"
2. 🔹 **Jelaskan topik** - Katakan "jelaskan tentang [topik]"
3. 🔹 **Analisis gambar** - Klik tombol 📷 dan upload foto
4. 🔹 **Voice note** - Klik tombol 🎤 dan bicara

💡 **Contoh perintah:**
- "buatkan program doa"
- "jelaskan tentang AI"

    async function sendMessage() {
        const message = textInput.value.trim();
        if(!message && !currentImage) return;
        
        currentMessages.push({ role: 'user', text: message || '[Gambar]', image: currentImage });
        renderMessages();
        
        textInput.value = '';
        textInput.style.height = 'auto';
        const imageToSend = currentImage;
        currentImage = null;
        clearImage();
        
        currentMessages.push({ role: 'ai', text: '🧠 DYNAN sedang berpikir...', isLoading: true });
        renderMessages();
        
        const response = await getAIResponse(message);
        
        currentMessages = currentMessages.filter(m => !m.isLoading);
        currentMessages.push({ role: 'ai', text: response });
        renderMessages();
        saveHistory();
    }
    
    function renderMessages() {
        if(!messagesArea) return;
        if(currentMessages.length === 0) {
            messagesArea.innerHTML = `<div class="welcome"><div class="welcome-icon">🧠</div><h2>DYNAN META AI</h2><p>Halo XSO, saya siap membantu. Coba tanyakan apa saja!</p></div>`;
            return;
        }
        messagesArea.innerHTML = currentMessages.map(msg => `
            <div class="message message-${msg.role === 'user' ? 'user' : 'ai'}">
                <div class="avatar">${msg.role === 'user' ? '👑' : '🧠'}</div>
                <div class="bubble">
                    <div class="name">${msg.role === 'user' ? 'XSO' : 'DYNAN'}</div>
                    <div class="text">${escapeHtml(msg.text).replace(/\n/g, '<br>').replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')}</div>
                    ${msg.image ? `<img src="${msg.image}" class="message-image" onclick="window.open(this.src)">` : ''}
                </div>
            </div>
        `).join('');
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    
    function newChat() { currentMessages = []; renderMessages(); saveHistory(); closeSidebar(); }
    
    function clearChat() { if(confirm('Hapus semua percakapan?')) { currentMessages = []; renderMessages(); localStorage.removeItem('dynan_messages'); document.getElementById('historyList').innerHTML = ''; closeSidebar(); } }
    
    function saveHistory() {
        if(currentMessages.length === 0) return;
        const history = JSON.parse(localStorage.getItem('dynan_messages') || '[]');
        const firstMsg = currentMessages.find(m => m.role === 'user');
        const title = firstMsg ? firstMsg.text.substring(0, 25) : 'Chat';
        history.unshift({ id: Date.now(), title, messages: [...currentMessages] });
        localStorage.setItem('dynan_messages', JSON.stringify(history.slice(0, 30)));
        loadHistory();
    }
    
    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('dynan_messages') || '[]');
        const historyList = document.getElementById('historyList');
        if(historyList) {
            historyList.innerHTML = history.map(h => `<div class="history-item" onclick="window.loadChat(${h.id})">💬 ${escapeHtml(h.title)}</div>`).join('');
        }
    }
    
    window.loadChat = function(id) {
        const history = JSON.parse(localStorage.getItem('dynan_messages') || '[]');
        const chat = history.find(h => h.id === id);
        if(chat) { currentMessages = [...chat.messages]; renderMessages(); closeSidebar(); }
    };
</script>
</body>
</html>
