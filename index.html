<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DYNAN META AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Chat Container -->
    <div class="chat-container">
        
        <!-- Header -->
        <div class="header">
            <button id="menuBtn" class="menu-btn">☰</button>
            <div class="title">🧠 DYNAN META AI</div>
            <button id="clearBtn" class="clear-btn">🗑️</button>
        </div>

        <!-- Sidebar (sembunyi) -->
        <div id="sidebar" class="sidebar">
            <button id="newChatBtn" class="new-chat-btn">+ New Chat</button>
            <div id="historyList" class="history-list"></div>
        </div>

        <!-- Area Pesan -->
        <div id="messagesArea" class="messages-area">
            <div class="welcome">
                <div class="welcome-icon">🧠</div>
                <h2>DYNAN META AI</h2>
                <p>Halo XSO, saya siap membantu.</p>
            </div>
        </div>

        <!-- Input Area (PASTI DI BAWAH) -->
        <div class="input-area">
            <div class="input-row">
                <textarea id="textInput" placeholder="Ketik pesan..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn">➤</button>
            </div>
            <div class="toolbar">
                <button id="imageBtn" class="tool-btn">📷</button>
                <button id="voiceBtn" class="tool-btn">🎤</button>
                <input type="file" id="imageFile" accept="image/*" hidden>
            </div>
            <div id="imagePreview" class="image-preview" style="display:none">
                <img id="previewImg">
                <button id="removeImgBtn">✖</button>
            </div>
            <div id="voiceStatus" class="voice-status" style="display:none">
                🎙️ Merekam... <button id="stopVoiceBtn">Stop</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
